<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToniOS - Test Simple</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .test-container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            max-width: 400px;
            margin: 0 auto;
        }
        
        .test-input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        
        .test-button {
            background: #3498db;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>ToniOS - Test Simple</h1>
        <p>Si vous voyez cette page, le CSS fonctionne.</p>
        
        <form id="testForm">
            <input type="text" class="test-input" placeholder="Nom d'utilisateur" id="username">
            <input type="password" class="test-input" placeholder="Mot de passe" id="password">
            <button type="button" class="test-button" onclick="testLogin()">Tester</button>
        </form>
        
        <div id="result" style="margin-top: 20px;"></div>
    </div>

    <script>
        function testLogin() {
            const username = document.getElementById('username').value;
            const result = document.getElementById('result');
            
            if (username) {
                result.innerHTML = `<p style="color: green;">Bonjour ${username}! Le JavaScript fonctionne.</p>`;
            } else {
                result.innerHTML = `<p style="color: red;">Veuillez entrer un nom d'utilisateur.</p>`;
            }
        }
        
        console.log('JavaScript chargé correctement');
    </script>
</body>
</html>
